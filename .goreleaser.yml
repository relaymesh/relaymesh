version: 2
project_name: relaymesh

builds:
  - id: relaymesh
    main: ./main.go
    binary: relaymesh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w"

archives:
  - id: relaymesh
    builds: [relaymesh]
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - ids: [relaymesh]
    homepage: "https://github.com/relaymesh/relaymesh"
    description: "Webhook router + worker SDK for GitHub, GitLab, Bitbucket. Route events by rules and consume via Watermill."
    license: "MIT"
    directory: Formula
    repository:
      owner: "relaymesh"
      name: "homebrew-formula"
    test: |
      system "#{bin}/relaymesh", "--help"
    install: |
      bin.install "relaymesh"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: "relaymesh"
    name: "relaymesh"
  draft: true
