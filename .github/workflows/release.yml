name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Set up Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run tests
        run: go test ./...
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean 
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push relaymesh image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/relaymesh/relaymesh:${{ github.ref_name }}
            ghcr.io/relaymesh/relaymesh:latest

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive SDK version from tag
        run: |
          echo "SDK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
        working-directory: sdk/typescript/worker
      - name: Bump TypeScript SDK version
        run: npm version "$SDK_VERSION" --no-git-tag-version --allow-same-version
        working-directory: sdk/typescript/worker
      - name: Build package
        run: npm run build
        working-directory: sdk/typescript/worker
      - name: Publish package
        run: npm publish --access public
        working-directory: sdk/typescript/worker
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive SDK version from tag
        run: |
          echo "SDK_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "RELAYMESH_PY_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python install
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine
      - name: Bump Python SDK version
        run: |
          python - <<'PY'
          import os
          print(f"Preparing relaymesh Python SDK version {os.environ['RELAYMESH_PY_VERSION']}")
          PY
      - name: Build package
        run: |
          rm -rf dist
          python setup.py sdist bdist_wheel
        working-directory: sdk/python/worker
      - name: Publish PyPI package
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "PYPI_TOKEN not set; skipping PyPI publish."
            exit 0
          fi
          python -m twine upload sdk/python/worker/dist/*
